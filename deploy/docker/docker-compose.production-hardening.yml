services:
  zai-coder:
    build:
      context: ../..
      dockerfile: Dockerfile.production
    container_name: zai-coder-production
    restart: unless-stopped
    environment:
      ZAI_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://zai@postgres:5432/zai}
    ports:
      - "127.0.0.1:8765:8765"
    volumes:
      - ../../data:/app/data
      - ../../logs:/app/logs
      - ../../storage:/app/storage
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8765/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: zai
      POSTGRES_USER: zai
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"

volumes:
  postgres-data:
